# domain-invariants/BOARD_CMS.yaml
# 게시판/CMS 유형 제품에 적용되는 불변 규칙
# 생성: AI (gnuboard5 매뉴얼 + PoC-γ 결함 분석에서 추출)
# 승인: jh910 (2026-05-19)
#
# 추가 방법:
#   1. 결함 카탈로그의 patternProposal → PATTERN_EXTRACT → suggestedInvariant 후보 검토
#   2. 이 파일에 항목 추가 (status: candidate → approved)

- name: auth_gate_mutable_actions
  statement: "게시글·댓글의 수정·삭제 액션은 소유자 또는 관리자 계정만 실행할 수 있어야 한다"
  appliesTo: [UPDATE, DELETE]
  verification: "비로그인 또는 타인 계정으로 수정·삭제 요청 시 거부 응답"
  severity_on_violation: CRITICAL
  source: "DEF-2026-BRD-001 (PoC-γ BUG-2)"
  status: approved

- name: post_title_max_length
  statement: "게시글 제목은 최대 50자까지만 저장 가능해야 한다"
  appliesTo: [CREATE, UPDATE]
  verification: "51자 제목 입력 시 오류 메시지 표시 및 저장 거부"
  severity_on_violation: MAJOR
  source: "gnuboard5_spec.md §3.1 + DEF-2026-BRD-002"
  status: approved

- name: pagination_out_of_range_fallback
  statement: "전체 페이지 수를 초과하는 페이지 번호 접근 시 마지막 페이지 또는 안내 메시지를 표시해야 한다"
  appliesTo: [READ]
  verification: "page > maxPage 접근 시 빈 화면이 아닌 fallback 처리 확인"
  severity_on_violation: MAJOR
  source: "DEF-2026-BRD-003 (PoC-γ BUG-1)"
  status: approved

- name: required_field_empty_rejection
  statement: "제목·내용 등 필수 입력 필드는 빈값 제출 시 오류 메시지를 표시하고 저장을 거부해야 한다"
  appliesTo: [CREATE, UPDATE, AUTH]
  verification: "각 필수 필드를 비운 채 제출 시 해당 필드 오류 메시지 표시"
  severity_on_violation: MAJOR
  source: "DEF-2026-BRD-004 + DEF-2026-BRD-005 (PoC-γ BUG-4/5)"
  status: approved

- name: edit_form_validation_parity
  statement: "수정 폼의 입력 검증 규칙(필수값, 최대 길이 등)은 작성 폼과 동일해야 한다"
  appliesTo: [UPDATE]
  verification: "작성 폼 검증 통과 기준과 수정 폼 검증 통과 기준 일치 확인"
  severity_on_violation: MAJOR
  source: "DEF-2026-BRD-005 (PoC-γ BUG-5)"
  status: approved

- name: non_owner_action_button_hidden
  statement: "소유자가 아닌 사용자에게는 수정·삭제 버튼이 노출되지 않아야 한다"
  appliesTo: [READ, UPDATE, DELETE]
  verification: "타인 계정 로그인 후 상세 화면에서 수정·삭제 버튼 미노출 확인"
  severity_on_violation: MAJOR
  source: "DEF-2026-BRD-001 + gnuboard5_spec.md §3.3"
  status: approved

- name: anonymous_write_blocked
  statement: "비로그인 사용자는 게시글·댓글 작성 버튼이 노출되지 않아야 한다"
  appliesTo: [CREATE]
  verification: "비로그인 상태에서 글쓰기·댓글 작성 폼 미노출 및 직접 접근 차단"
  severity_on_violation: MAJOR
  source: "gnuboard5_spec.md §1.1"
  status: approved

- name: delete_cascades_to_comments
  statement: "게시글 삭제 시 해당 게시글의 댓글도 함께 삭제되어야 한다"
  appliesTo: [DELETE]
  verification: "게시글 삭제 후 해당 게시글의 댓글이 목록에 남지 않음 확인"
  severity_on_violation: MINOR
  source: "gnuboard5_spec.md §2.4"
  status: approved
